name: Sandbox Destroy

on:
  workflow_dispatch:

# For reusable workflows, the permissions setting for id-token should be set to write at the
# caller workflow level or in the specific job that calls the reusable workflow.

permissions:
  contents: read
  id-token: write

jobs:
  datadog_manifests_us_east1_b:
    name: "Datadog Manifests: us-east1-b"
    uses: osinfra-io/pt-techne-opentofu-workflows/.github/workflows/plan-and-apply.yml@3f9adb2285dd7249063dbaa9cfcabd0c7966e3e2 # v0.3.3
    with:
      checkout_ref: ${{ github.ref }}
      github_environment: "Sandbox Datadog Manifests: us-east1-b"
      service_account: pt-pneuma-github@pt-corpus-tfc9-sb.iam.gserviceaccount.com
      opentofu_kms_encryption_key: projects/pt-corpus-tfc9-sb/locations/us/keyRings/state-encryption/cryptoKeys/default
      opentofu_plan_args: -destroy
      opentofu_state_bucket: pt-pneuma-state-sb
      opentofu_version: ${{ vars.OPENTOFU_VERSION }}
      opentofu_workspace: us-east1-b-datadog-manifests-sandbox
      working_directory: regional/datadog/manifests
      workload_identity_provider: projects/190688376851/locations/global/workloadIdentityPools/github-actions/providers/github-actions-oidc
    secrets:
      opentofu_plan_secret_args: >-
        -var=datadog_api_key=${{ secrets.DATADOG_API_KEY }}
        -var=datadog_app_key=${{ secrets.DATADOG_APP_KEY }}

  datadog_manifests_us_east4_a:
    name: "Datadog Manifests: us-east4-a"
    uses: osinfra-io/pt-techne-opentofu-workflows/.github/workflows/plan-and-apply.yml@3f9adb2285dd7249063dbaa9cfcabd0c7966e3e2 # v0.3.3
    with:
      checkout_ref: ${{ github.ref }}
      github_environment: "Sandbox Datadog Manifests: us-east4-a"
      service_account: pt-pneuma-github@pt-corpus-tfc9-sb.iam.gserviceaccount.com
      opentofu_kms_encryption_key: projects/pt-corpus-tfc9-sb/locations/us/keyRings/state-encryption/cryptoKeys/default
      opentofu_plan_args: -destroy
      opentofu_state_bucket: pt-pneuma-state-sb
      opentofu_version: ${{ vars.OPENTOFU_VERSION }}
      opentofu_workspace: us-east4-a-datadog-manifests-sandbox
      working_directory: regional/datadog/manifests
      workload_identity_provider: projects/190688376851/locations/global/workloadIdentityPools/github-actions/providers/github-actions-oidc
    secrets:
      opentofu_plan_secret_args: >-
        -var=datadog_api_key=${{ secrets.DATADOG_API_KEY }}
        -var=datadog_app_key=${{ secrets.DATADOG_APP_KEY }}

  us_east1_b_onboarding:
    name: "Onboarding: us-east1-b"
    uses: osinfra-io/pt-techne-opentofu-workflows/.github/workflows/plan-and-apply.yml@3f9adb2285dd7249063dbaa9cfcabd0c7966e3e2 # v0.3.3
    needs: datadog_manifests_us_east1_b
    with:
      checkout_ref: ${{ github.ref }}
      github_environment: "Sandbox Onboarding: us-east1-b"
      service_account: pt-pneuma-github@pt-corpus-tfc9-sb.iam.gserviceaccount.com
      opentofu_kms_encryption_key: projects/pt-corpus-tfc9-sb/locations/us/keyRings/state-encryption/cryptoKeys/default
      opentofu_plan_args: -destroy
      opentofu_state_bucket: pt-pneuma-state-sb
      opentofu_version: ${{ vars.OPENTOFU_VERSION }}
      opentofu_workspace: us-east1-b-onboarding-sandbox
      working_directory: regional/onboarding
      workload_identity_provider: projects/190688376851/locations/global/workloadIdentityPools/github-actions/providers/github-actions-oidc

  us_east4_a_onboarding:
    name: "Onboarding: us-east4-a"
    uses: osinfra-io/pt-techne-opentofu-workflows/.github/workflows/plan-and-apply.yml@3f9adb2285dd7249063dbaa9cfcabd0c7966e3e2 # v0.3.3
    needs: datadog_manifests_us_east4_a
    with:
      checkout_ref: ${{ github.ref }}
      github_environment: "Sandbox Onboarding: us-east4-a"
      service_account: pt-pneuma-github@pt-corpus-tfc9-sb.iam.gserviceaccount.com
      opentofu_kms_encryption_key: projects/pt-corpus-tfc9-sb/locations/us/keyRings/state-encryption/cryptoKeys/default
      opentofu_plan_args: -destroy
      opentofu_state_bucket: pt-pneuma-state-sb
      opentofu_version: ${{ vars.OPENTOFU_VERSION }}
      opentofu_workspace: us-east4-a-onboarding-sandbox
      working_directory: regional/onboarding
      workload_identity_provider: projects/190688376851/locations/global/workloadIdentityPools/github-actions/providers/github-actions-oidc

  us_east1_b:
    name: "Regional: us-east1-b"
    uses: osinfra-io/pt-techne-opentofu-workflows/.github/workflows/plan-and-apply.yml@3f9adb2285dd7249063dbaa9cfcabd0c7966e3e2 # v0.3.3
    needs: us_east1_b_onboarding
    with:
      checkout_ref: ${{ github.ref }}
      github_environment: "Sandbox: us-east1-b"
      service_account: pt-pneuma-github@pt-corpus-tfc9-sb.iam.gserviceaccount.com
      opentofu_kms_encryption_key: projects/pt-corpus-tfc9-sb/locations/us/keyRings/state-encryption/cryptoKeys/default
      opentofu_plan_args: -var-file=environments/us-east1-b-sandbox.tfvars -destroy
      opentofu_state_bucket: pt-pneuma-state-sb
      opentofu_version: ${{ vars.OPENTOFU_VERSION }}
      opentofu_workspace: us-east1-b-sandbox
      working_directory: regional
      workload_identity_provider: projects/190688376851/locations/global/workloadIdentityPools/github-actions/providers/github-actions-oidc

  us_east4_a:
    name: "Regional: us-east4-a"
    uses: osinfra-io/pt-techne-opentofu-workflows/.github/workflows/plan-and-apply.yml@3f9adb2285dd7249063dbaa9cfcabd0c7966e3e2 # v0.3.3
    needs: us_east4_a_onboarding
    with:
      checkout_ref: ${{ github.ref }}
      github_environment: "Sandbox: us-east4-a"
      service_account: pt-pneuma-github@pt-corpus-tfc9-sb.iam.gserviceaccount.com
      opentofu_kms_encryption_key: projects/pt-corpus-tfc9-sb/locations/us/keyRings/state-encryption/cryptoKeys/default
      opentofu_plan_args: -var-file=environments/us-east4-a-sandbox.tfvars -destroy
      opentofu_state_bucket: pt-pneuma-state-sb
      opentofu_version: ${{ vars.OPENTOFU_VERSION }}
      opentofu_workspace: us-east4-a-sandbox
      working_directory: regional
      workload_identity_provider: projects/190688376851/locations/global/workloadIdentityPools/github-actions/providers/github-actions-oidc
